{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-page auth-page-center">
  <div class="auth-card-wrap">
    <div class="auth-card">
      <div class="auth-header">
        <a href="{{ url_for('index') }}" class="auth-logo">⬡ Secure<span class="accent">App</span></a>
        <div class="auth-icon-lg">🔑</div>
        <h1>Set New Password</h1>
        <p>Choose a strong, unique password</p>
      </div>
      <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="auth-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" id="password" name="password" placeholder="New password"
                   required autocomplete="new-password" class="form-input"
                   oninput="checkPasswordStrength(this.value)"/>
            <button type="button" class="toggle-pw" onclick="togglePassword('password')">👁</button>
          </div>
          <div class="strength-meter">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <span class="strength-label" id="strengthLabel">Enter a password</span>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="confirm_password" name="confirm_password"
                   placeholder="Repeat new password" required class="form-input"
                   oninput="checkPasswordMatch()"/>
          </div>
          <span class="match-hint" id="matchHint"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}<script src="{{ url_for('static', filename='js/auth.js') }}"></script>{% endblock %}
